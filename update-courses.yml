name: Update UnderPar Course Data

on:
  schedule:
    - cron: '0 8 * * *'   # runs every day at 8am UTC (4am ET)
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape UnderPar
        run: python scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update course data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
