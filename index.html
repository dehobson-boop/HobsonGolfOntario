<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hobson's Choice Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark:  #1a3022;
    --green-mid:   #2d5a3d;
    --green-light: #4a8c5c;
    --green-pale:  #d4edd9;
    --gold:        #c9a84c;
    --gold-light:  #f0d485;
    --cream:       #f8f4ec;
    --cream-dark:  #ede8de;
    --white:       #ffffff;
    --text-dark:   #1a1a1a;
    --text-mid:    #4a4a4a;
    --text-muted:  #888;
    --shadow-sm:   0 2px 8px rgba(26,48,34,.08);
    --shadow-md:   0 6px 24px rgba(26,48,34,.12);
    --shadow-lg:   0 16px 48px rgba(26,48,34,.16);
    --radius:      10px;
    --radius-lg:   16px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--green-dark);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header-pattern {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(74,140,92,.18) 0%, transparent 60%),
      radial-gradient(circle at 80% 20%, rgba(201,168,76,.10) 0%, transparent 50%);
    pointer-events: none;
  }
  .header-stripes {
    position: absolute; bottom: 0; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg, var(--green-mid) 0px, var(--green-mid) 40px, var(--green-light) 40px, var(--green-light) 80px);
    opacity: .5;
  }
  .header-inner {
    position: relative;
    max-width: 1100px; margin: 0 auto;
    padding: 3rem 2rem 2.5rem;
    display: flex; flex-direction: column; gap: .6rem;
  }
  .header-tag {
    font-size: 11px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
    color: var(--gold); display: flex; align-items: center; gap: 8px;
  }
  .header-tag::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--gold); }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; color: var(--white); line-height: 1.1; }
  header h1 span { color: var(--gold-light); }
  .header-sub { font-size: 15px; color: rgba(255,255,255,.65); font-weight: 300; margin-top: .2rem; }

  /* ── Search Panel ── */
  .search-panel {
    background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    padding: 1.75rem 2rem; max-width: 1100px; margin: -1.5rem auto 2rem;
    position: relative; z-index: 10;
  }
  .search-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
  .search-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
  .search-field.wide { flex: 2; min-width: 220px; }
  .search-field label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
  .search-field input, .search-field select {
    height: 44px; padding: 0 14px;
    border: 1.5px solid var(--cream-dark); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--text-dark); background: var(--cream);
    transition: border-color .2s, box-shadow .2s; width: 100%;
  }
  .search-field input:focus, .search-field select:focus {
    outline: none; border-color: var(--green-light);
    box-shadow: 0 0 0 3px rgba(74,140,92,.12); background: var(--white);
  }
  .btn-search {
    height: 44px; padding: 0 28px; background: var(--green-dark); color: var(--white);
    border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s, transform .1s;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn-search:hover { background: var(--green-mid); }
  .btn-search:active { transform: scale(.98); }
  .search-status { margin-top: 1rem; font-size: 13px; color: var(--text-muted); min-height: 18px; }
  .search-status.error { color: #b94a48; }
  .quick-picks { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 12px; }
  .qp-label { font-size: 12px; color: var(--text-muted); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-right: 2px; }
  .qp-btn {
    padding: 4px 12px; border-radius: 99px; border: 1px solid var(--cream-dark);
    background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text-mid); cursor: pointer; transition: all .15s;
  }
  .qp-btn:hover { border-color: var(--green-light); color: var(--green-mid); background: var(--white); }

  /* ── Main ── */
  main { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }
  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .results-count { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--green-dark); }
  .results-count span { color: var(--green-light); }
  .sort-pills { display: flex; gap: 6px; }
  .sort-pill {
    padding: 5px 14px; border-radius: 99px; border: 1.5px solid var(--cream-dark);
    font-size: 12px; font-weight: 500; cursor: pointer; background: var(--white);
    color: var(--text-mid); transition: all .15s; white-space: nowrap;
  }
  .sort-pill:hover { border-color: var(--green-light); color: var(--green-mid); }
  .sort-pill.active { background: var(--green-dark); border-color: var(--green-dark); color: var(--white); }

  /* ── Cards ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .course-card {
    background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--cream-dark);
    padding: 1.4rem 1.5rem; transition: box-shadow .2s, transform .15s, border-color .2s;
    display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden;
  }
  .course-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--green-mid), var(--green-light));
    transform: scaleX(0); transform-origin: left; transition: transform .25s;
  }
  .course-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--green-pale); }
  .course-card:hover::before { transform: scaleX(1); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--green-dark); line-height: 1.25; }
  .badge-off { flex-shrink: 0; background: var(--green-dark); color: var(--gold-light); font-size: 11px; font-weight: 700; letter-spacing: .05em; padding: 4px 10px; border-radius: 99px; white-space: nowrap; }
  .badge-stay { flex-shrink: 0; background: var(--gold); color: var(--green-dark); font-size: 11px; font-weight: 700; letter-spacing: .05em; padding: 4px 10px; border-radius: 99px; white-space: nowrap; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .meta-loc { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .meta-dist { font-size: 13px; font-weight: 500; color: var(--green-light); background: var(--green-pale); padding: 2px 9px; border-radius: 99px; }
  .card-price { display: flex; align-items: baseline; gap: 6px; }
  .price-main { font-size: 1.5rem; font-weight: 700; color: var(--green-dark); font-family: 'Playfair Display', serif; }
  .price-note { font-size: 12px; color: var(--text-muted); }
  .price-rack { font-size: 12px; color: var(--text-muted); text-decoration: line-through; }
  .card-deal { font-size: 13px; color: var(--text-mid); line-height: 1.5; border-top: 1px solid var(--cream-dark); padding-top: 10px; }
  .card-actions { display: flex; gap: 12px; align-items: center; margin-top: 2px; flex-wrap: wrap; }
  .card-book {
    display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500;
    color: var(--green-mid); text-decoration: none; transition: color .15s;
  }
  .card-book:hover { color: var(--green-dark); }
  .card-book svg, .btn-map svg { transition: transform .15s; }
  .card-book:hover svg { transform: translateX(2px); }
  .btn-map {
    display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500;
    color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 0;
    font-family: 'DM Sans', sans-serif; transition: color .15s;
  }
  .btn-map:hover { color: var(--green-mid); }

  /* ── Map Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,20,14,.6);
    z-index: 1000; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: var(--radius-lg); width: 100%; max-width: 820px;
    max-height: 92vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.35);
  }
  .modal-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--cream-dark); gap: 12px;
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--green-dark); line-height: 1.3; }
  .modal-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .modal-close {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--cream-dark);
    background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-muted); line-height: 1; transition: all .15s;
  }
  .modal-close:hover { background: var(--cream); color: var(--text-dark); }
  #map { flex: 1; min-height: 420px; }
  .modal-footer {
    padding: .9rem 1.5rem; border-top: 1px solid var(--cream-dark);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .modal-info { font-size: 13px; color: var(--text-muted); }
  .modal-info strong { color: var(--green-dark); font-weight: 500; }
  .btn-directions {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
    background: var(--green-dark); color: var(--white); border-radius: var(--radius);
    text-decoration: none; font-size: 13px; font-weight: 500; transition: background .15s;
  }
  .btn-directions:hover { background: var(--green-mid); }

  /* ── Empty / Footer ── */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); grid-column: 1 / -1; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .4; }
  .empty-state p { font-size: 15px; }
  footer { background: var(--green-dark); color: rgba(255,255,255,.5); text-align: center; padding: 1.5rem 2rem; font-size: 13px; }
  footer a { color: var(--gold); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .header-inner { padding: 2rem 1.25rem 2rem; }
    .search-panel { margin: -1rem 1rem 1.5rem; padding: 1.25rem; }
    main { padding: 0 1rem 3rem; }
    .search-field.wide { min-width: 100%; }
    .sort-pills { display: none; }
    #map { min-height: 300px; }
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .course-card { animation: fadeUp .3s ease both; }
</style>
</head>
<body>

<header>
  <div class="header-pattern"></div>
  <div class="header-inner">
    <div class="header-tag">Hobson's Choice Golf</div>
    <h1>Hobson's <span>Choice</span></h1>
    <p class="header-sub">Ontario golf deals from UnderPar.com — filter by your location &amp; travel distance</p>
  </div>
  <div class="header-stripes"></div>
</header>

<div class="search-panel">
  <div class="search-row">
    <div class="search-field wide">
      <label for="loc">Your location</label>
      <input type="text" id="loc" placeholder="e.g. Guelph, ON" value="Guelph, ON" />
    </div>
    <div class="search-field">
      <label for="dist">Max distance</label>
      <input type="number" id="dist" min="10" max="800" value="100" />
    </div>
    <div class="search-field">
      <label for="unit">Unit</label>
      <select id="unit">
        <option value="km" selected>Kilometres</option>
        <option value="mi">Miles</option>
      </select>
    </div>
    <button class="btn-search" onclick="search()">Search Courses</button>
  </div>
  <div class="quick-picks">
    <span class="qp-label">Quick:</span>
    <button class="qp-btn" onclick="quickPick('Toronto, ON',43.6532,-79.3832)">Toronto</button>
    <button class="qp-btn" onclick="quickPick('Guelph, ON',43.5448,-80.2482)">Guelph</button>
    <button class="qp-btn" onclick="quickPick('Ottawa, ON',45.4215,-75.6972)">Ottawa</button>
    <button class="qp-btn" onclick="quickPick('Hamilton, ON',43.2557,-79.8711)">Hamilton</button>
    <button class="qp-btn" onclick="quickPick('London, ON',42.9849,-81.2453)">London</button>
    <button class="qp-btn" onclick="quickPick('Barrie, ON',44.3894,-79.6903)">Barrie</button>
    <button class="qp-btn" onclick="quickPick('Kingston, ON',44.2312,-76.4860)">Kingston</button>
    <button class="qp-btn" onclick="quickPick('Windsor, ON',42.3149,-83.0364)">Windsor</button>
  </div>
  <div id="status" class="search-status"></div>
</div>

<main>
  <div class="results-bar" id="results-bar" style="display:none">
    <div class="results-count" id="results-count"></div>
    <div class="sort-pills">
      <button class="sort-pill active" onclick="setSort(this,'dist')">Nearest first</button>
      <button class="sort-pill" onclick="setSort(this,'off')">Best deal</button>
      <button class="sort-pill" onclick="setSort(this,'price')">Lowest price</button>
    </div>
  </div>
  <div class="card-grid" id="grid"></div>
</main>

<!-- Map Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Course Map</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeMapModal()" aria-label="Close map">&times;</button>
    </div>
    <div id="map"></div>
    <div class="modal-footer">
      <div class="modal-info" id="modal-info"></div>
      <a class="btn-directions" id="modal-directions" href="#" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        Open in Google Maps
      </a>
    </div>
  </div>
</div>

<footer>
  Courses and deals sourced from <a href="https://www.underpar.com/courses/canada/ontario" target="_blank">UnderPar.com</a> &mdash; prices may change, always confirm before booking.
</footer>

/* ── Haversine ── */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function geocode(address) {
  // Normalize: lowercase, strip punctuation, trim
  const key = address.toLowerCase()
    .replace(/,.*$/, '')       // drop anything after comma
    .replace(/on/g, '')    // remove "ON"
    .replace(/[^a-z0-9 -]/g, '')
    .trim();

  // Direct match
  if (ONTARIO_CITIES[key]) {
    const c = ONTARIO_CITIES[key];
    const display = key.split(' ').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ') + ', ON';
    return Promise.resolve({lat: c.lat, lng: c.lng, display});
  }

  // Partial match — find first city whose name contains the search term
  const partial = Object.keys(ONTARIO_CITIES).find(k => k.includes(key) || key.includes(k));
  if (partial) {
    const c = ONTARIO_CITIES[partial];
    const display = partial.split(' ').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ') + ', ON';
    return Promise.resolve({lat: c.lat, lng: c.lng, display});
  }

  return Promise.reject(new Error(`"${address}" not found. Try a nearby city — see the Quick Pick buttons, or type a major Ontario city name.`));
}

/* ── Search ── */
async function search() {
  const locStr = document.getElementById('loc').value.trim();
  const maxDist = parseFloat(document.getElementById('dist').value) || 100;
  const unit = document.getElementById('unit').value;
  const statusEl = document.getElementById('status');
  if (!locStr) { statusEl.textContent = 'Please enter a location.'; statusEl.className = 'search-status error'; return; }
  statusEl.className = 'search-status';
  statusEl.textContent = 'Locating…';
  document.getElementById('results-bar').style.display = 'none';
  document.getElementById('grid').innerHTML = '';
  let origin;
  try {
    origin = await geocode(locStr);
    originCoords = origin;
  } catch(e) {
    statusEl.textContent = e.message + ' — or use a Quick Pick button below.';
    statusEl.className = 'search-status error';
    return;
  }
  const maxKm = unit === 'mi' ? maxDist * KM_PER_MI : maxDist;
  currentResults = COURSES.map(c => {
    const distKm = haversine(origin.lat, origin.lng, c.lat, c.lng);
    const distVal = unit === 'mi' ? distKm / KM_PER_MI : distKm;
    return {...c, distKm, distVal, distDisplay: Math.round(distVal) + ' ' + unit};
  }).filter(c => c.distKm <= maxKm);
  statusEl.textContent = `Showing courses within ${maxDist} ${unit} of ${origin.display}`;
  applySortAndRender();
  document.getElementById('results-bar').style.display = 'flex';
}

/* ── Quick pick ── */
function quickPick(name, lat, lng) {
  document.getElementById('loc').value = name;
  const unit = document.getElementById('unit').value;
  const maxDist = parseFloat(document.getElementById('dist').value) || 100;
  const maxKm = unit === 'mi' ? maxDist * KM_PER_MI : maxDist;
  const statusEl = document.getElementById('status');
  statusEl.className = 'search-status';
  statusEl.textContent = `Showing courses within ${maxDist} ${unit} of ${name}`;
  originCoords = {lat, lng, display: name};
  currentResults = COURSES.map(c => {
    const distKm = haversine(lat, lng, c.lat, c.lng);
    const distVal = unit === 'mi' ? distKm / KM_PER_MI : distKm;
    return {...c, distKm, distVal, distDisplay: Math.round(distVal) + ' ' + unit};
  }).filter(c => c.distKm <= maxKm);
  applySortAndRender();
  document.getElementById('results-bar').style.display = 'flex';
}

/* ── Sort ── */
function setSort(el, sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applySortAndRender();
}

/* ── Render cards ── */
function applySortAndRender() {
  const sorted = [...currentResults];
  if (currentSort === 'dist') sorted.sort((a,b) => a.distKm - b.distKm);
  else if (currentSort === 'off') sorted.sort((a,b) => b.off - a.off);
  else if (currentSort === 'price') sorted.sort((a,b) => a.price - b.price);
  document.getElementById('results-count').innerHTML = `<span>${sorted.length}</span> course${sorted.length !== 1 ? 's' : ''} found`;
  const grid = document.getElementById('grid');
  if (!sorted.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⛳</div><p>No courses found within that distance.<br>Try increasing your range.</p></div>`;
    return;
  }
  grid.innerHTML = sorted.map((c, i) => {
    const badge = c.stay ? `<span class="badge-stay">Stay &amp; Play</span>` : c.off > 0 ? `<span class="badge-off">${c.off}% OFF</span>` : '';
    const priceLabel = (c.stay || c.off > 0) ? 'from ' : '';
    const rackHtml = c.rack ? `<span class="price-rack">$${c.rack.toFixed(2)}</span>` : '';
    const idx = COURSES.indexOf(c) >= 0 ? COURSES.indexOf(c) : i;
    return `
      <div class="course-card" style="animation-delay:${i * 40}ms">
        <div class="card-top">
          <div class="card-name">${c.name}</div>
          ${badge}
        </div>
        <div class="card-meta">
          <span class="meta-loc">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${c.loc}
          </span>
          <span class="meta-dist">${c.distDisplay}</span>
        </div>
        <div class="card-price">
          <span class="price-note">${priceLabel}</span>
          <span class="price-main">$${c.price.toFixed(2)}</span>
          ${rackHtml}
          <span class="price-note">CDN</span>
        </div>
        <div class="card-deal">${c.deal}</div>
        <div class="card-actions">
          <a class="card-book" href="${c.url}" target="_blank" rel="noopener">
            Book on UnderPar
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <button class="btn-map" onclick='openMapModal(${JSON.stringify(c)})'>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>

/* ── Custom marker SVG ── */
function makeIcon(color, label) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
    <path d="M16 0C7.163 0 0 7.163 0 16c0 9.941 14.25 23.25 15.15 24.08a1.2 1.2 0 001.7 0C17.75 39.25 32 25.941 32 16 32 7.163 24.837 0 16 0z" fill="${color}"/>
    <circle cx="16" cy="16" r="9" fill="white" opacity="0.95"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" font-weight="700" font-family="sans-serif" fill="${color}">${label}</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [32, 40],
    iconAnchor: [16, 40],
    popupAnchor: [0, -40]
  });
}

/* ── Open map modal ── */
function openMapModal(course) {
  if (typeof L === 'undefined') {
    alert('Map library is still loading — please try again in a moment, or check your internet connection.');
    return;
  }
  if (!originCoords) { alert('Please search for a location first.'); return; }
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  document.getElementById('modal-title').textContent = course.name;
  document.getElementById('modal-subtitle').textContent = `${course.loc} · ${course.distDisplay || ''}`;

  const distKm = haversine(originCoords.lat, originCoords.lng, course.lat, course.lng);
  const distMi = distKm / KM_PER_MI;
  document.getElementById('modal-info').innerHTML =
    `<strong>${distKm.toFixed(1)} km</strong> (${distMi.toFixed(1)} mi) as the crow flies`;

  const gmUrl = `https://www.google.com/maps/dir/?api=1&origin=${originCoords.lat},${originCoords.lng}&destination=${course.lat},${course.lng}&travelmode=driving`;
  document.getElementById('modal-directions').href = gmUrl;

  // Init or reuse map
  setTimeout(() => {
    if (!leafletMap) {
      leafletMap = L.map('map', {zoomControl: true});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 18
      }).addTo(leafletMap);
    }

    // Clear old layers
    mapLayers.forEach(l => leafletMap.removeLayer(l));
    mapLayers = [];

    const originLL = L.latLng(originCoords.lat, originCoords.lng);
    const courseLL = L.latLng(course.lat, course.lng);

    // Origin marker
    const mOrigin = L.marker(originLL, {icon: makeIcon('#1a3022', 'A')})
      .bindPopup(`<strong>Your location</strong><br>${originCoords.display}`)
      .addTo(leafletMap);

    // Course marker
    const mCourse = L.marker(courseLL, {icon: makeIcon('#c9a84c', '⛳')})
      .bindPopup(`<strong>${course.name}</strong><br>${course.loc}<br>$${course.price.toFixed(2)} CDN${course.off > 0 ? ' · ' + course.off + '% off' : ''}`)
      .addTo(leafletMap);

    // Dashed route line
    const line = L.polyline([originLL, courseLL], {
      color: '#2d5a3d',
      weight: 2.5,
      opacity: 0.7,
      dashArray: '8, 8'
    }).addTo(leafletMap);

    // Midpoint arrow marker
    const midLat = (originCoords.lat + course.lat) / 2;
    const midLng = (originCoords.lng + course.lng) / 2;
    const bearing = Math.atan2(
      course.lng - originCoords.lng,
      course.lat - originCoords.lat
    ) * 180 / Math.PI;
    const arrowSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" style="transform:rotate(${bearing}deg)">
      <polygon points="10,2 18,18 10,13 2,18" fill="#2d5a3d" opacity="0.85"/>
    </svg>`;
    const arrowIcon = L.divIcon({html: arrowSvg, className: '', iconSize: [20,20], iconAnchor: [10,10]});
    const arrow = L.marker([midLat, midLng], {icon: arrowIcon, interactive: false}).addTo(leafletMap);

    mapLayers = [mOrigin, mCourse, line, arrow];

    // Fit bounds with padding
    const bounds = L.latLngBounds([originLL, courseLL]);
    leafletMap.fitBounds(bounds, {padding: [48, 48]});

    // Open course popup
    setTimeout(() => mCourse.openPopup(), 300);
  }, 50);
}

/* ── Close modal ── */
function closeMapModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeMapModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMapModal(); });

document.getElementById('loc').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
document.getElementById('dist').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

window.addEventListener('load', search);
</script>
</body>
</html>
